name: CI — saorsa-core

on:
  push:
    branches: [main]
    paths:
      - "crates/saorsa-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "crates/saorsa-core/**"
      - "Cargo.toml"
      - "Cargo.lock"

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint (saorsa-core)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (strict)
        run: cargo clippy -p saorsa-core --all-targets -- -D warnings -D clippy::unwrap_used -D clippy::expect_used

  test:
    name: Test (saorsa-core)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Unit tests
        run: cargo test -p saorsa-core --lib

  doc:
    name: Doc (saorsa-core)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc -p saorsa-core --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
